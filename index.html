<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>28ปี กุ๊งกิ๊งยอดนักสืบ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    display: flex; align-items: center; justify-content: center;
  }
  #gameWrap {
    position: relative;
    width: 960px; height: 540px;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    background: #87CEEB;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  #hud {
    position: absolute; top: 8px; left: 8px;
    color: #fff;
    font-size: 24px;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 5;
  }
  #hint {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 18px;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 5;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: #fff;
    text-align: center;
    pointer-events: auto;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .panel {
    background: rgba(0,0,0,0.55);
    border: 4px solid #fff;
    padding: 28px 40px;
    max-width: 80%;
  }
  .panel h1 { font-size: 36px; margin-bottom: 12px; text-shadow: 3px 3px 0 #d8326b; }
  .panel h2 { font-size: 26px; margin-bottom: 10px; }
  .panel p { font-size: 16px; line-height: 1.5; margin: 8px 0; }
  .panel button {
    margin-top: 14px;
    padding: 10px 22px;
    background: #ffcc00;
    border: 3px solid #fff;
    color: #222;
    font-family: inherit;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    text-shadow: none;
  }
  .panel button:hover { background: #fff; }
  .levelBtns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hud"></div>
  <div id="hint"></div>

  <div id="titleScreen" class="overlay">
    <div class="panel">
      <h1>28ปี กุ๊งกิ๊งยอดนักสืบ</h1>
      <p>การผจญภัยของพยาบาลสาวนักสืบสุดเก่ง</p>
      <p style="font-size:13px; opacity:0.8;">ใช้ปุ่ม ← → หรือ A/D เพื่อเดิน · Space หรือ ↑ เพื่อกระโดด</p>
      <button onclick="startGame()">เริ่มเกม</button>
      <button onclick="showLevels()">เลือกด่าน</button>
    </div>
  </div>

  <div id="levelScreen" class="overlay hidden">
    <div class="panel">
      <h2>เลือกด่าน</h2>
      <p style="font-size:13px;">เรื่องราว 1 ปีของกุ๊งกิ๊ง</p>
      <div class="levelBtns">
        <button onclick="loadStage(1)" aria-label="ด่าน 1 ไล่เตะแมว">1. ไล่เตะแมว</button>
        <button onclick="loadStage(2)" aria-label="ด่าน 2 โรงพยาบาล">2. โรงพยาบาล</button>
      </div>
      <button onclick="hide('levelScreen'); show('titleScreen')">กลับ</button>
    </div>
  </div>

  <div id="messageScreen" class="overlay hidden">
    <div class="panel" id="messagePanel"></div>
  </div>
</div>

<script>
/* =========================================================
   28ปี กุ๊งกิ๊งยอดนักสืบ - Pixel art birthday mini-game
   Single-file HTML5 Canvas game
   ========================================================= */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;   // 480
const H = canvas.height;  // 270

const hud = document.getElementById('hud');
const hint = document.getElementById('hint');

/* ----------------- INPUT ----------------- */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function held(...ks) { return ks.some(k => keys[k.toLowerCase()]); }

/* ----------------- HELPERS ----------------- */
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showMessage(html, onClose) {
  const panel = document.getElementById('messagePanel');
  panel.innerHTML = html;
  const btn = document.createElement('button');
  btn.textContent = 'ต่อไป';
  btn.onclick = () => { hide('messageScreen'); onClose && onClose(); };
  panel.appendChild(btn);
  show('messageScreen');
}

/* ----------------- PIXEL DRAWING HELPERS ----------------- */
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

/* Draw pixel art from a grid string. '.' = transparent, other chars map to palette */
function drawSprite(grid, palette, x, y, scale = 1) {
  for (let row = 0; row < grid.length; row++) {
    const line = grid[row];
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === '.' || ch === ' ') continue;
      const color = palette[ch];
      if (!color) continue;
      px(x + col * scale, y + row * scale, scale, scale, color);
    }
  }
}

/* ----------------- BACKGROUND ----------------- */
// Background sky color
const SKY = '#7BC8E8';
const SKY_LIGHT = '#9EDCEF';

function drawCloud(x, y) {
  const c1 = '#ffffff', c2 = '#e8f4fb';
  const s = 6;
  const grid = [
    '..####....',
    '.######.##',
    '##########',
    '.########.',
  ];
  drawSprite(grid, {'#': c1}, x, y, s);
  drawSprite([
    '..........',
    '..........',
    '..oo...oo.',
    '..........',
  ], {'o': c2}, x, y, s);
}

function drawTree(x, groundY) {
  const trunkColor = '#8B5A2B';
  const trunkDark = '#5C3A1A';
  const leaves = '#3FA64D';
  const leavesDark = '#2E7D38';
  const leavesLight = '#5DC065';

  // trunk
  px(x + 20, groundY - 44, 12, 44, trunkColor);
  px(x + 20, groundY - 44, 4, 44, trunkDark);

  // leaves
  const lg = [
    '..####..',
    '.######.',
    '########',
    '########',
    '########',
    '.######.',
    '..####..',
  ];
  drawSprite(lg, {'#': leaves}, x, groundY - 100, 8);
  drawSprite([
    '..oo....',
    '.o......',
    'o.......',
    '........',
    '........',
    '........',
    '........',
  ], {'o': leavesLight}, x, groundY - 100, 8);
  drawSprite([
    '......dd',
    '.......d',
    '........',
    '........',
    '.......d',
    '......dd',
    '..ddddd.',
  ], {'d': leavesDark}, x, groundY - 100, 8);
}

function drawBush(x, groundY) {
  const c = '#3FA64D', cd = '#2E7D38', cl = '#5DC065';
  drawSprite([
    '..####..',
    '.######.',
    '########',
    '########',
  ], {'#': c}, x, groundY - 32, 4);
  drawSprite([
    '..oo....',
    '.o......',
    'o.......',
    '........',
  ], {'o': cl}, x, groundY - 32, 4);
  drawSprite([
    '......dd',
    '.......d',
    '........',
    '.dddddd.',
  ], {'d': cd}, x, groundY - 32, 4);
}

function drawGround(groundY) {
  px(0, groundY, W, 12, '#5DC065');
  px(0, groundY + 12, W, 4, '#3FA64D');
  px(0, groundY + 16, W, H - groundY - 16, '#7E4A22');
  for (let i = 0; i < 80; i++) {
    const dx = (i * 47) % W;
    const dy = groundY + 28 + ((i * 31) % (H - groundY - 32));
    px(dx, dy, 4, 4, '#5C3214');
  }
  for (let i = 0; i < 60; i++) {
    const gx = (i * 23) % W;
    px(gx, groundY - 2, 4, 2, '#7BD478');
  }
}

let cloudOffset = 0;
function drawSkyBackground(groundY, opts = {}) {
  // sky gradient
  px(0, 0, W, groundY - 60, SKY);
  px(0, groundY - 60, W, 60, SKY_LIGHT);

  cloudOffset = (cloudOffset + 0.3) % W;
  const clouds = [
    {x: 40, y: 60}, {x: 360, y: 36}, {x: 680, y: 72}, {x: 160, y: 120}, {x: 560, y: 140},
  ];
  for (const c of clouds) {
    let cx = (c.x - cloudOffset);
    while (cx < -120) cx += W + 120;
    drawCloud(cx, c.y);
  }
}

/* ----------------- KUNGKING SPRITE (chibi cute) ----------------- */
// Pink headband + black bob + big sparkly eyes + blush + white shirt + denim shorts
const KK_PALETTE = {

  'h': '#1a1a1a', // hair black

  'p': '#FFB6D5', // pink headband

  'd': '#4F7CB0', // denim shorts

// 16x20 sprite, scale 2 -> 32x40
const KK_IDLE = [

  '.hhhhhhhhhhhhhh.',  // 5 bangs (hair below band)
  '.hssssssssssssh.',  // 6 face plain
  '.hssHHssssHHssh.',  // 7 eyebrows
  '.hssiessssiessh.',  // 8 eyes top w/ sparkle highlight
  '.hsseesssseessh.',  // 9 eyes bottom
  '.hssssssssssssh.',  // 10
  '.hsBssssssssBsh.',  // 11 blush
  '..hssssmmmssssh.',  // 12 small smile
  '..hssssssssssh..',  // 13 chin
  '...wwwwwwwwww...',  // 14 collar
  '..wwwwwwwwwwww..',  // 15 shirt
  '.wwwwwwwwwwwwww.',  // 16 shirt wider
  '..dddddddddddd..',  // 17 denim shorts
  '...ss......ss...',  // 18 legs
  '...bb......bb...',  // 19 shoes
];

const KK_WALK1 = [

  '..hhhhhhhhhhhh..',

  '.hhhhhhhhhhhhhh.',
  '.hssssssssssssh.',
  '.hssHHssssHHssh.',
  '.hssiessssiessh.',
  '.hsseesssseessh.',
  '.hssssssssssssh.',
  '.hsBssssssssBsh.',
  '..hssssmmmssssh.',
  '..hssssssssssh..',
  '...wwwwwwwwww...',
  '..wwwwwwwwwwww..',
  '.wwwwwwwwwwwwww.',
  '..dddddddddddd..',

  '..bb........bb..',

const KK_WALK2 = [

  '.PppppppppppppP.',
  '.hhhhhhhhhhhhhh.',
  '.hssssssssssssh.',
  '.hssHHssssHHssh.',
  '.hssiessssiessh.',
  '.hsseesssseessh.',

  '.hsBssssssssBsh.',
  '..hssssmmmssssh.',

const KK_JUMP = [
  '................',
  '....hhhhhhhh....',
  '..hhhhhhhhhhhh..',
  '.pppppppppppppp.',
  '.PppppppppppppP.',
  '.hhhhhhhhhhhhhh.',
  '.hssssssssssssh.',
  '.hssHHssssHHssh.',
  '.hssiessssiessh.',  // excited but eyes still visible
  '.hsseesssseessh.',
  '.hssssssssssssh.',

// Kick pose: body leaned forward, HIGH kick
const KK_KICK = [
  '..................',  // 0  air
  '.....hhhhhhhh...',   // 1  hair top
  '...hhhhhhhhhhhh.',   // 2  hair widens
  '..pppppppppppppp',   // 3  headband
  '..PppppppppppppP',   // 4  headband shadow
  '..hhhhhhhhhhhhhh',   // 5  bangs
  '..hssssssssssssh',   // 6  face
  '..hssHHssssHHssh',   // 7  eyebrows fierce
  '..hssHessssHessh',   // 8  pupils under brow
  '..hssssssssssssh',   // 9  lower face
  '..hsBsssOOOsssBh',   // 10 blush + open mouth
  '...hsssssssssssh',   // 11 chin
  'wwwwwwwwwwwwwwww..',  // 12 arms wide
  '.wwwwwwwwwwwwwwww.',  // 13 shirt
  '..WWwwwwwwwwwwWW..',  // 14 shirt shadow
  '....dddddddddd....',  // 15 hip
  '....ddd...........',  // 16 standing leg
  '....bbb..ddddssss',   // 17 stand shoe + kick thigh+shin
  '..............bbbb',  // 18 kick shoe (short, compact)
];

function drawKungKing(x, y, state, dir, scale = 2) {
  let grid = KK_IDLE;
  if (state === 'walk') {
    grid = (Math.floor((Date.now() / 120)) % 2 === 0) ? KK_WALK1 : KK_WALK2;
  }
  if (state === 'jump') grid = KK_JUMP;
  if (state === 'kick') grid = KK_KICK;
  const pal = Object.assign({}, KK_PALETTE, {'0': '#1a1a1a', 'O': '#D85370'});

  // --- kick VFX: motion lines + glow BEFORE drawing sprite ---
  if (state === 'kick') {
    const cx = x + 9 * scale;
    const cy = y + 12 * scale;
    const kickX = dir === 1 ? x + 18 * scale : x;
    const kickY = y + 23 * scale;

    // glow around shoe
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(kickX, kickY, scale * 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // motion lines (3 streaks from body toward kick direction)
    ctx.save();
    ctx.strokeStyle = '#FF8C00';
    ctx.lineWidth = scale * 0.8;
    ctx.globalAlpha = 0.6;
    for (let i = 0; i < 4; i++) {
      const ly = kickY - scale * (4 - i) * 2;
      const lx0 = dir === 1 ? cx + scale * i * 2 : cx - scale * i * 2;
      const lx1 = dir === 1 ? kickX - scale * 3 : kickX + scale * 3;
      ctx.beginPath();
      ctx.moveTo(lx0, ly + scale * i);
      ctx.lineTo(lx1, kickY - scale * (3 - i));
      ctx.stroke();
    }
    ctx.restore();
  }

  if (dir === -1) {
    for (let row = 0; row < grid.length; row++) {
      const line = grid[row];
      for (let col = 0; col < line.length; col++) {
        const ch = line[line.length - 1 - col];
        if (ch === '.' || ch === ' ') continue;
        const color = pal[ch];
        if (!color) continue;
        px(x + col * scale, y + row * scale, scale, scale, color);
      }
    }
  } else {
    drawSprite(grid, pal, x, y, scale);
  }

  // sparkle on idle
  if (state === 'idle') {
    const t = Math.floor(Date.now() / 300) % 2;
    if (t === 0) {
      const sx = x + (dir === 1 ? 30 : -4);
      const sy = y + 4;
      px(sx, sy, 2, 2, '#FFD700');
      px(sx - 2, sy + 2, 2, 2, '#FFD700');
      px(sx + 2, sy + 2, 2, 2, '#FFD700');
      px(sx, sy + 4, 2, 2, '#FFD700');
    }
  }
}

// มอมแมม — white cat with black patches, sitting pose (ขาว-ดำ)
function drawMomMaem(x, y, s = 4, hurt = false) {
  const W2 = hurt ? '#FF8888' : '#FFFFFF'; // flash red when hurt
  drawSprite([
    '..eee...eee...',  // ears
    '..eWWWWWe.....',  // ear fill
    '.WWWWWWWWWWW..',  // head
    '.WooWBBBBWooW.',  // eyes + black patch on forehead

    'wWWBBBBBBBBWww',  // black stripe body
    'wwWWBBBBBBWwww',  // black
    '.WWWWWWWWWWWW.',  // belly white
    '.WWWWWWWWWW...',  // body lower
    '.WWWWWWWWWW..TT', // tail
    '.WWWWWWWW..TTTT', // tail curve (black tail)
    '.bbW..WbbWW....',  // paws (one black one white)
  ], {
    'e': '#888888',   // grey ear
    'W': W2,          // white fur (red if hurt)
    'B': '#222222',   // black patches
    'o': '#44BB44',   // green eyes (แมวขาว-ดำมักตาเขียว)
    'n': '#FF99BB',   // pink nose
    'w': '#DDDDDD',   // whisker light grey
    'T': '#333333',   // black tail
    'b': '#555555',   // dark paw
  }, x, y, s);
  // ชื่อ มอมแมม ลอยเหนือหัว
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = `bold ${s * 4}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.strokeText('มอมแมม', x + (14 * s / 2), y - 4);
  ctx.fillText('มอมแมม', x + (14 * s / 2), y - 4);
  ctx.textAlign = 'left';
}

// Kick impact burst (star/hit effect)
function drawKickEffect(x, y, frame) {
  const t = frame / 20;
  const r = 8 + t * 24;
  const colors = ['#FFD700','#FF4D6D','#fff'];
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t;
    const ex = x + Math.cos(angle) * r;
    const ey = y + Math.sin(angle) * r;
    px(ex - 4, ey - 4, 8, 8, colors[i % colors.length]);
  }
  const s = 6;
  if (frame < 12) {
    px(x - s, y - 2, s * 2, 4, '#FFD700');
    px(x - 2, y - s, 4, s * 2, '#FFD700');
  }
  if (frame < 15) {
    ctx.fillStyle = '#FF4D6D';
    ctx.font = `bold ${14 + Math.floor(t * 6)}px monospace`;
    ctx.fillText('KICK!', x - 24, y - 12 - t * 12);
  }
}

/* ----------------- PLATFORM PHYSICS ----------------- */
function updatePlatformer(p, lvl, dt) {
  const speed = 3.2;
  const jumpV = 9.0;
  const gravity = 0.44;

  // Kick (Z or X key) - can kick on ground or in air
  if ((held('z','x')) && p.kickTimer === 0) {
    p.kickTimer = 22;
  }
  if (p.kickTimer > 0) p.kickTimer--;

  // Horizontal input (slower when kicking on ground)
  let moveX = 0;
  if (!(p.kickTimer > 10 && p.onGround)) {
    if (held('arrowleft','a')) moveX = -1;
    if (held('arrowright','d')) moveX = 1;
  }
  p.vx = moveX * speed;
  if (moveX !== 0) p.dir = moveX;

  // Jump
  if ((held(' ','arrowup','w')) && (p.onGround || p.coyote > 0)) {
    p.vy = -jumpV;
    p.onGround = false;
    p.coyote = 0;
  }

  // Gravity
  p.vy += gravity;
  if (p.vy > 14) p.vy = 14;

  // Move X
  p.x += p.vx;
  // Bound horizontally
  if (p.x < 0) p.x = 0;
  if (p.x + p.w > lvl.width) p.x = lvl.width - p.w;

  // Move Y + ground collision
  p.y += p.vy;
  p.onGround = false;

  // Ground
  if (p.y + p.h >= lvl.groundY) {
    p.y = lvl.groundY - p.h;
    p.vy = 0;
    p.onGround = true;
  }

  // Platforms (one-way)
  if (p.vy >= 0) {
    for (const plat of lvl.platforms) {
      if (p.x + p.w > plat.x && p.x < plat.x + plat.w) {
        const prevY = p.y - p.vy;
        if (prevY + p.h <= plat.y + 4 && p.y + p.h >= plat.y && p.y + p.h <= plat.y + 24) {
          p.y = plat.y - p.h;
          p.vy = 0;
          p.onGround = true;
        }
      }
    }
  }

  if (p.onGround) p.coyote = 6;
  else if (p.coyote > 0) p.coyote--;

  // State
  if (p.kickTimer > 0) p.state = 'kick';
  else if (!p.onGround) p.state = 'jump';
  else if (Math.abs(p.vx) > 0.1) p.state = 'walk';
  else p.state = 'idle';
  p.animTimer++;
  if (p.invuln > 0) p.invuln--;
}

function collide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ----------------- STAGE UPDATERS ----------------- */
function updateStage1or4(lvl, p) {
  updatePlatformer(p, lvl, 1);

  const pb = {x: p.x + 4, y: p.y + 8, w: p.w - 8, h: p.h - 8};

  // pills
  for (const it of lvl.pills) {
    if (!it.taken && collide(pb, {x: it.x, y: it.y, w: 28, h: 20})) {
      it.taken = true;
      GAME.score += 10;
    }
  }
  // hearts
  for (const it of lvl.hearts) {
    if (!it.taken && collide(pb, {x: it.x, y: it.y, w: 28, h: 24})) {
      it.taken = true;
      GAME.lives = Math.min(5, GAME.lives + 1);
      GAME.score += 25;
    }
  }
  // cakes & gifts (stage 4)
  if (lvl.cakes) for (const it of lvl.cakes) {
    if (!it.taken && collide(pb, {x: it.x, y: it.y, w: 36, h: 36})) {
      it.taken = true; GAME.score += 20;
    }
  }
  if (lvl.gifts) for (const it of lvl.gifts) {
    if (!it.taken && collide(pb, {x: it.x, y: it.y, w: 36, h: 28})) {
      it.taken = true; GAME.score += 30;
    }
  }

  // viruses
  for (const v of lvl.viruses) {
    if (!v.alive) continue;
    v.x += v.dir * 1.0;
    if (v.x > v.baseX + v.range) v.dir = -1;
    if (v.x < v.baseX - v.range) v.dir = 1;
    if (collide(pb, {x: v.x, y: v.y, w: 28, h: 28}) && p.invuln === 0) {
      // stomp?
      if (p.vy > 0.5 && p.y + p.h < v.y + 16) {
        v.alive = false;
        p.vy = -7;
        GAME.score += 15;
      } else {
        GAME.lives--;
        p.invuln = 60;
        p.vy = -6;
        p.x -= p.dir * 16;
      }
    }
  }

  // kick attack hitbox (active frames: kickTimer 22..10)
  if (p.kickTimer > 10) {
    const kickReach = 52;
    const kickX = p.dir === 1 ? p.x + p.w : p.x - kickReach;
    const kickBox = {x: kickX, y: p.y + 28, w: kickReach, h: 32};
    for (const v of lvl.viruses) {
      if (!v.alive) continue;
      if (collide(kickBox, {x: v.x, y: v.y, w: 28, h: 28})) {
        v.alive = false;
        GAME.score += 20;
        p.kickEffect = {
          x: v.x + 14 - (GAME.camX || 0),
          worldX: v.x + 14,
          y: v.y + 8,
          frame: 0
        };
      }
    }
  }

  // tick kick effect
  if (p.kickEffect) {
    p.kickEffect.frame++;
    if (p.kickEffect.frame > 20) p.kickEffect = null;
  }

  // patient healing - check if linked virus is dead
  if (lvl.patients) {
    for (const pat of lvl.patients) {
      if (!pat.healed && !lvl.viruses[pat.virusIdx].alive) {
        pat.healed = true;
        GAME.score += 30;
      }
    }
  }

  // goal check
  if (lvl.goal) {
    const targetMet = lvl.winCondition === 'viruses'
      ? lvl.viruses.every(v => !v.alive)
      : (lvl.cakes
          ? lvl.cakes.filter(x=>x.taken).length >= (lvl.target||6)
          : lvl.pills.filter(x=>x.taken).length >= (lvl.target||8));
    if (collide(pb, {x: lvl.goal.x, y: lvl.goal.y - 60, w: 60, h: 60})) {
      if (targetMet) {
        winStage();
      } else {
        hint.textContent = lvl.winCondition === 'viruses'
          ? `กำจัดเชื้อโรคให้หมดก่อนนะ! เหลือ ${lvl.viruses.filter(v=>v.alive).length} ตัว`
          : `เก็บให้ครบ ${lvl.target} ชิ้นก่อนนะ!`;
      }
    }
  }

  // out of lives
  if (GAME.lives <= 0) loseStage();

  // fall off
  if (p.y > H + 80) {
    GAME.lives--;
    if (GAME.lives <= 0) loseStage();
    else respawnPlayer(lvl);
  }
}

function respawnPlayer(lvl) {
  GAME.player = newPlayer(40, lvl.groundY - 64);
  GAME.player.invuln = 60;
}

/* ----------------- STAGE 2 (catch) ----------------- */
function updateStage2(lvl) {
  // Runner behavior replaced by updateStageRun
  // kept for compatibility
  updateStageRun(lvl);
}

// Runner: กุ๊งกิ๊งวิ่งปกป้องมอมแมม
function updateStageRun(lvl) {
  if (!GAME.player) GAME.player = newPlayer(40, 240);
  const p = GAME.player;
  const SPD = 5;
  const mm = lvl.mommaem;

  // 4-directional movement
  let moveX = 0, moveY = 0;
  if (held('arrowleft','a')) moveX = -1;
  if (held('arrowright','d')) moveX = 1;
  if (held('arrowup','w')) moveY = -1;
  if (held('arrowdown','s')) moveY = 1;
  if (moveX !== 0 && moveY !== 0) { moveX *= 0.707; moveY *= 0.707; }
  p.vx = moveX * SPD;
  p.vy = moveY * SPD;
  if (moveX !== 0) p.dir = moveX;

  if (held('z','x') && p.kickTimer === 0) p.kickTimer = 22;
  if (p.kickTimer > 0) p.kickTimer--;

  p.x += p.vx; p.y += p.vy;
  if (p.x < 0) p.x = 0;
  if (p.x + p.w > lvl.width) p.x = lvl.width - p.w;
  if (p.y < 0) p.y = 0;
  if (p.y + p.h > (lvl.height || 540)) p.y = (lvl.height || 540) - p.h;

  p.onGround = true;
  p.state = p.kickTimer > 0 ? 'kick' : (Math.abs(p.vx) + Math.abs(p.vy) > 0.1) ? 'walk' : 'idle';
  if (p.invuln > 0) p.invuln--;

  GAME.camX = Math.max(0, Math.min(lvl.width - W, p.x - W/2 + 32));

  // มอมแมม hurtTimer + วิ่งหากุ๊งกิ๊ง
  if (mm.hurtTimer > 0) mm.hurtTimer--;

  // มอมแมมวิ่งหากุ๊งกิ๊ง
  const mmDx = p.x - mm.x;
  const mmDy = p.y - mm.y;
  const mmDist = Math.sqrt(mmDx*mmDx + mmDy*mmDy) || 1;
  const mmSpd = 2.2;
  if (mmDist > 80) {
    mm.x += (mmDx / mmDist) * mmSpd;
    mm.y += (mmDy / mmDist) * mmSpd;
  }
  mm.x = Math.max(20, Math.min(lvl.width - 60, mm.x));
  mm.y = Math.max(20, Math.min((lvl.height||540) - 60, mm.y));
  // นับ frame animation และ speech
  mm.frame = (mm.frame || 0) + 1;
  if (!mm.cryTimer) mm.cryTimer = 0;
  if (mm.hurtTimer > 30) mm.cryTimer = 90; // ร้องขอความช่วยเหลือ 90 เฟรมหลังโดนตี
  if (mm.cryTimer > 0) mm.cryTimer--;

  // cats AI: ไล่มอมแมม!
  for (const c of lvl.cats) {
    // KO countdown
    if (c.koTimer > 0) {
      c.koTimer--;
      if (c.koTimer === 0) c.alive = false;
      if (c.kickEffect) { c.kickEffect.frame++; if (c.kickEffect.frame > 20) c.kickEffect = null; }
      continue;
    }
    if (!c.alive) continue;

    c.frame = (c.frame || 0) + 1;

    // วิ่งเข้าหามอมแมม
    const dx = mm.x - c.x;
    const dy = mm.y - c.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    c.vx += (dx / dist) * 0.15;
    c.vy += (dy / dist) * 0.15;

    // หนีผู้เล่นเล็กน้อย (กลัวกุ๊งกิ๊งบ้าง)
    const pdx = c.x - p.x;
    const pdy = c.y - p.y;
    const pdist = Math.sqrt(pdx*pdx + pdy*pdy) || 1;
    if (pdist < 180) {
      c.vx += (pdx / pdist) * 0.25;
      c.vy += (pdy / pdist) * 0.25;
    }

    const spd = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
    const maxSpd = 3.5;
    if (spd > maxSpd) { c.vx = c.vx/spd*maxSpd; c.vy = c.vy/spd*maxSpd; }

    c.x += c.vx; c.y += c.vy;
    if (c.x < 10) { c.x = 10; c.vx = Math.abs(c.vx); }
    if (c.x > lvl.width - 10) { c.x = lvl.width - 10; c.vx = -Math.abs(c.vx); }
    if (c.y < 10) { c.y = 10; c.vy = Math.abs(c.vy); }
    if (c.y > (lvl.height||540) - 50) { c.y = (lvl.height||540) - 50; c.vy = -Math.abs(c.vy); }

    if (c.kickEffect) { c.kickEffect.frame++; if (c.kickEffect.frame > 20) c.kickEffect = null; }

    // แมวถึงมอมแมม → ทำร้าย!
    if (dist < 52 && mm.hurtTimer === 0) {
      mm.hp -= 8;
      mm.hurtTimer = 40; // cooldown ระหว่างโดนทำร้าย
      // กระแทกแมวกลับ
      c.vx = -(dx/dist) * 3;
      c.vy = -(dy/dist) * 3;
      if (mm.hp <= 0) {
        mm.hp = 0;
        loseStage();
        return;
      }
    }

    // kick hitbox ของกุ๊งกิ๊ง
    if (p.kickTimer > 10) {
      const kx = p.dir === 1 ? p.x + p.w : p.x - 52;
      if (collide({x: kx, y: p.y + 20, w: 52, h: 36}, {x: c.x, y: c.y, w: 48, h: 48})) {
        c.koTimer = 50; GAME.score += 30;
        c.kickEffect = {x: c.x + 24, y: c.y, frame: 0};
        // เตะกระเด็น
        const ex = c.x - p.x, ey = c.y - p.y;
        const el = Math.sqrt(ex*ex+ey*ey)||1;
        c.vx = (ex/el)*8; c.vy = (ey/el)*8;
      }
    }
  }

  // win: แมวอันธพาลหมด
  if (lvl.cats.every(c => !c.alive && c.koTimer === 0)) winStage();
}

function drawStage2(lvl) {
  const H2 = lvl.height || 540;
  ctx.fillStyle = '#5aaa44';
  ctx.fillRect(0, 0, W, H2);

  const cx = GAME.camX || 0;

  // grid (ทุ่ง)
  ctx.strokeStyle = 'rgba(80,160,60,0.4)';
  ctx.lineWidth = 2;
  const gridSize = 120;
  for (let gx = (-(cx % gridSize)); gx < W; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H2); ctx.stroke();
  }
  for (let gy = 0; gy < H2; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // trees
  const treePositions = [[200,80],[500,350],[800,140],[1100,400],[1400,60],[1700,300],
    [2000,180],[2300,420],[2600,80],[2900,320],[3200,150],[3500,390]];
  for (const [tx, ty] of treePositions) {
    const sx = tx - cx;
    if (sx > -60 && sx < W + 60) {
      ctx.fillStyle = '#2d7a1f';
      ctx.beginPath(); ctx.arc(sx, ty, 34, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3da830';
      ctx.beginPath(); ctx.arc(sx - 8, ty - 8, 20, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#55cc44';
      ctx.beginPath(); ctx.arc(sx + 6, ty + 4, 14, 0, Math.PI*2); ctx.fill();
    }
  }

  const p = GAME.player;
  const mm = lvl.mommaem;

  // --- วาดมอมแมม ---
  const mmSX = mm.x - cx;
  const mmSY = mm.y;
  // วงกลมป้องกัน (aura)
  const pulse = 0.7 + Math.sin(Date.now()/300) * 0.3;
  ctx.save();
  ctx.globalAlpha = 0.15 * pulse;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(mmSX + 28, mmSY + 24, 60, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(mmSX+28, mmSY+50, 24, 9, 0, 0, Math.PI*2); ctx.fill();
  if (mm.hp > 0) {
    drawMomMaem(mmSX, mmSY, 4, mm.hurtTimer > 0);
    // กรอบ HP มอมแมม (เหนือตัว)
    const barW = 80, barH = 10;
    const bx = mmSX + (28 - barW/2), by = mmSY - 28;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
    ctx.fillStyle = '#E63946';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = mm.hp > 50 ? '#44DD44' : mm.hp > 25 ? '#FFD700' : '#FF4D00';
    ctx.fillRect(bx, by, barW * (mm.hp / mm.maxHp), barH);

    // Speech bubble "ช่วยด้วยๆ" เมื่อโดนตี
    if (mm.cryTimer > 0) {
      const alpha = Math.min(1, mm.cryTimer / 20);
      const bobY = mmSY - 60 - Math.sin(Date.now() / 150) * 5;
      const msgs = ['ช่วยด้วย! 😿', 'กุ๊งกิ๊ง!! 😿', 'โอ้ยๆๆ! 😿'];
      const msg = msgs[Math.floor(mm.cryTimer / 30) % msgs.length];
      const bw = ctx.measureText(msg).width + 24;

      ctx.save();
      ctx.globalAlpha = alpha;
      // กล่อง bubble
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.roundRect(mmSX + 28 - bw/2, bobY - 30, bw, 34, 8);
      ctx.fill();
      ctx.strokeStyle = '#FF4D6D';
      ctx.lineWidth = 3;
      ctx.stroke();
      // หางฟองคำพูด
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(mmSX + 24, bobY + 4);
      ctx.lineTo(mmSX + 32, bobY + 16);
      ctx.lineTo(mmSX + 40, bobY + 4);
      ctx.fill();
      ctx.strokeStyle = '#FF4D6D';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(mmSX + 24, bobY + 4);
      ctx.lineTo(mmSX + 32, bobY + 16);
      ctx.lineTo(mmSX + 40, bobY + 4);
      ctx.stroke();
      // ข้อความ
      ctx.fillStyle = '#CC0033';
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(msg, mmSX + 28, bobY - 8);
      ctx.restore();
    }
  } else {
    drawMomMaemKO(mmSX, mmSY, 4);
  }

  // --- วาดแมวอันธพาล ---
  for (const c of lvl.cats) {
    const screenX = c.x - cx;
    const screenY = c.y;
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(screenX+28, screenY+48, 22, 8, 0, 0, Math.PI*2); ctx.fill();

    if (c.koTimer > 0) {
      const spin = (1 - c.koTimer / 50) * Math.PI * 4;
      ctx.save();
      ctx.translate(screenX + 28, screenY + 28);
      ctx.rotate(spin);
      ctx.translate(-28, -28);
      drawCatKO(0, 0, 4);
      ctx.restore();
      for (let i = 0; i < 3; i++) {
        const a = spin + (i / 3) * Math.PI * 2;
        const sr = 28 + Math.sin(spin * 2) * 8;
        const sx2 = screenX + 28 + Math.cos(a) * sr;
        const sy2 = screenY - 8 + Math.sin(a) * sr * 0.5;
        ctx.fillStyle = ['#FFD700','#FF4D6D','#fff'][i];
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('★', sx2 - 8, sy2);
      }
    } else if (c.alive) {
      if (Math.floor(c.frame / 8) % 2 === 0) drawCatWalkA(screenX, screenY, 4);
      else drawCatWalkB(screenX, screenY, 4);
    }
    if (c.kickEffect) drawKickEffect(c.kickEffect.x - cx, c.kickEffect.y, c.kickEffect.frame);
  }

  // วาด player
  if (p && (p.invuln === 0 || p.invuln % 6 < 3)) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(p.x-cx+16, p.y+60, 18, 7, 0, 0, Math.PI*2); ctx.fill();
    drawKungKing(p.x - cx, p.y, p.state, p.dir, 4);
  }

  // HUD มอมแมม HP bar ใหญ่ มุมบนซ้าย
  const hpPct = mm.hp / mm.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(10, 10, 280, 50);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🐱 มอมแมม HP', 18, 28);
  ctx.fillStyle = '#333';
  ctx.fillRect(18, 34, 240, 18);
  ctx.fillStyle = hpPct > 0.5 ? '#44DD44' : hpPct > 0.25 ? '#FFD700' : '#FF4400';
  ctx.fillRect(18, 34, 240 * hpPct, 18);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(18, 34, 240, 18);
  // แมวเหลือ
  const remaining = lvl.cats.filter(c => c.alive || c.koTimer > 0).length;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(W - 230, 10, 220, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`� แมวร้าย: ${remaining}/10`, W - 18, 36);
  ctx.textAlign = 'left';

  // เตือน HP ต่ำ
  if (mm.hurtTimer > 20) {
    ctx.save();
    ctx.globalAlpha = mm.hurtTimer / 40 * 0.4;
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(0, 0, W, H2);
    ctx.restore();
    ctx.fillStyle = '#FF4400';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('มอมแมมโดนทำร้าย! 😿', W/2, H2/2 - 20);
    ctx.textAlign = 'left';
  }
}

/* ----------------- STAGE 3 (memory) ----------------- */
let mouse = {x: 0, y: 0, down: false, click: false};
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
  mouse.click = true;
});

function memoryLayout(lvl) {
  const cols = 4, rows = 3;
  const cw = 160, ch = 140;
  const totalW = cols * cw + (cols - 1) * 20;
  const totalH = rows * ch + (rows - 1) * 20;
  const sx = (W - totalW) / 2;
  const sy = (H - totalH) / 2 + 20;
  const out = [];
  for (let i = 0; i < lvl.cards.length; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    out.push({
      x: sx + c * (cw + 20),
      y: sy + r * (ch + 20),
      w: cw, h: ch,
      card: lvl.cards[i],
    });
  }
  return out;
}

function updateStage3(lvl) {
  if (lvl.cooldown > 0) lvl.cooldown--;
  const cards = memoryLayout(lvl);

  if (mouse.click && lvl.cooldown === 0) {
    mouse.click = false;
    for (const c of cards) {
      if (mouse.x >= c.x && mouse.x <= c.x + c.w && mouse.y >= c.y && mouse.y <= c.y + c.h) {
        if (c.card.flipped || c.card.matched) break;
        if (lvl.selected.length >= 2) break;
        c.card.flipped = true;
        lvl.selected.push(c.card);
        if (lvl.selected.length === 2) {
          lvl.moves++;
          const [a, b] = lvl.selected;
          if (a.icon === b.icon) {
            a.matched = true; b.matched = true;
            lvl.matchedCount++;
            lvl.selected = [];
            GAME.score += 20;
            if (lvl.matchedCount === 6) winStage();
          } else {
            lvl.cooldown = 50;
          }
        }
        break;
      }
    }
  } else {
    mouse.click = false;
  }

  if (lvl.cooldown === 1 && lvl.selected.length === 2) {
    lvl.selected[0].flipped = false;
    lvl.selected[1].flipped = false;
    lvl.selected = [];
  }
}

function drawStage3(lvl) {
  drawSkyBackground(460);
  for (let i = 0; i < 6; i++) drawTree(i * 160, 460);
  drawGround(460);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`จับคู่: ${lvl.matchedCount}/6  ครั้งที่เปิด: ${lvl.moves}`, 24, 44);

  const cards = memoryLayout(lvl);
  for (const c of cards) {
    px(c.x + 6, c.y + 6, c.w, c.h, 'rgba(0,0,0,0.4)');
    if (c.card.matched) {
      px(c.x, c.y, c.w, c.h, '#7BD478');
      drawIcon(c.card.icon, c.x + c.w/2, c.y + c.h/2);
    } else if (c.card.flipped) {
      px(c.x, c.y, c.w, c.h, '#fff');
      px(c.x + 4, c.y + 4, c.w - 8, c.h - 8, '#FFF6E0');
      drawIcon(c.card.icon, c.x + c.w/2, c.y + c.h/2);
    } else {
      px(c.x, c.y, c.w, c.h, '#FF4D6D');
      px(c.x + 8, c.y + 8, c.w - 16, c.h - 16, '#D8326B');
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 60px monospace';
      ctx.fillText('?', c.x + c.w/2 - 18, c.y + c.h/2 + 22);
    }
  }
}

function drawIcon(icon, cx, cy) {
  const x = cx - 20, y = cy - 24;
  if (icon === 'heart') drawHeart(x, y, 6);
  else if (icon === 'pill') drawPill(x, y, 6);
  else if (icon === 'cake') drawCake(x - 8, y - 4, 6);
  else if (icon === 'gift') drawGift(x - 8, y - 4, 6);
  else if (icon === 'star') drawStar(x, y);
  else if (icon === 'flower') drawFlower(x, y);
}

function drawStar(x, y) {
  drawSprite([
    '....#....',
    '....#....',
    '...###...',
    '#########',
    '.#######.',
    '..#####..',
    '..##.##..',
    '.##...##.',
    '##.....##',
  ], {'#': '#FFD700'}, x, y, 4);
}

function drawFlower(x, y) {
  drawSprite([
    '..pp.pp..',
    '.pppppppp',
    'pppyypppp',
    'pppyypppp',
    '.pppppppp',
    '..pp.pp..',
    '....g....',
    '....g....',
    '...ggg...',
  ], {'p': '#FF8FB1', 'y': '#FFD700', 'g': '#3FA64D'}, x, y, 4);
}

/* ----------------- GAME LOOP ----------------- */
let camX = 0;
function loop() {
  if (GAME.state === 'playing') {
    const lvl = GAME.level;
    if (lvl.type === 'platform') {
      updateStage1or4(lvl, GAME.player);
      // camera follows player
      camX = Math.max(0, Math.min(lvl.width - W, GAME.player.x - W/2 + 32));
      GAME.camX = camX;
      drawStage(lvl, GAME.player, camX);
    } else if (lvl.type === 'catch' || lvl.type === 'run') {
      updateStageRun(lvl);
      drawStage2(lvl);
    } else if (lvl.type === 'memory') {
      updateStage3(lvl);
      drawStage3(lvl);
    }
    // hud
    let hudHtml = `Stage ${GAME.stage}/2  ❤×${GAME.lives}  คะแนน: ${GAME.score}`;
    if (lvl.type === 'run') {
      const aliveCats = lvl.cats ? lvl.cats.filter(c=>c.alive).length : 0;
      hudHtml += `  🐱 แมว: ${aliveCats} ตัว`;
    } else if (lvl.target && lvl.type === 'platform') {
      if (lvl.winCondition === 'viruses') {
        const remaining = lvl.viruses.filter(v => v.alive).length;
        hudHtml += `  🦠 เหลือ: ${remaining} ตัว`;
      } else {
        const got = lvl.cakes ? lvl.cakes.filter(x=>x.taken).length : lvl.pills.filter(x=>x.taken).length;
        hudHtml += `  เก็บ: ${got}/${lvl.target}`;
      }
    }
    hud.innerHTML = hudHtml;
    // hint bottom
    if (GAME.stage === 1 && lvl.type === 'run') {
      const mm = lvl.mommaem;
      const alive = lvl.cats ? lvl.cats.filter(c=>c.alive).length : 0;
      hint.textContent = `เตะแมวอันธพาลด้วย Z/X ก่อนมอมแมม HP หมด! HP: ${mm ? mm.hp : 0}/${mm ? mm.maxHp : 100} | แมวร้ายเหลือ ${alive} ตัว`;
    }
    if (GAME.stage === 2 && lvl.type === 'platform') {
      const allDead = lvl.viruses && lvl.viruses.every(v => !v.alive);
      const healedCount = lvl.patients ? lvl.patients.filter(p => p.healed).length : 0;
      hint.textContent = allDead
        ? `🎉 เชื้อโรคหมดแล้ว! คนไข้หาย ${healedCount}/${lvl.patients.length} คน – วิ่งไป GOAL!`
        : `กด Z หรือ X เพื่อ เตะ เชื้อโรค! | กระโดดแล้วเหยียบก็ได้`;
    }
  } else {
    hud.innerHTML = '';
  }
  requestAnimationFrame(loop);
}
loop();

/* ----------------- FLOW CONTROL ----------------- */
function startGame() {
  hide('titleScreen');
  GAME.totalScore = 0;
  GAME.lives = 3;
  loadStage(1);
}
function showLevels() {
  hide('titleScreen');
  show('levelScreen');
}

function loadStage(n) {
  hide('titleScreen'); hide('levelScreen'); hide('messageScreen');
  GAME.stage = n;
  GAME.score = 0;
  let lvl;
  if (n === 1) lvl = buildCatChaseStage();
  else if (n === 2) lvl = buildHospitalStage();
  else {
    console.warn(`Unknown stage: ${n}`);
    GAME.level = null;
    GAME.state = 'title';
    show('titleScreen');
    return;
  }
  lvl.isFinal = (n === FINAL_STAGE_NUMBER);
  GAME.level = lvl;
  if (lvl.type === 'platform') GAME.player = newPlayer(40, lvl.groundY - 64);
  else if (lvl.type === 'run') GAME.player = newPlayer(40, 240);
  else GAME.player = null;
  hint.textContent = '';

  // show intro
  showMessage(`<h2>${lvl.name}</h2><p>${lvl.intro.replace(/\n/g,'<br>')}</p>`, () => {
    GAME.state = 'playing';
  });
}

function winStage() {
  if (GAME.state !== 'playing') return;
  GAME.state = 'win';
  GAME.totalScore += GAME.score;
  const lvl = GAME.level;
  if (lvl.isFinal) {
    showEnding();
    return;
  }
  showMessage(
    `<h2>ผ่านด่าน ${GAME.stage}! 🎉</h2>
     <p>${lvl.secretMsg || ''}</p>
     <p>คะแนนด่านนี้: ${GAME.score}<br>คะแนนรวม: ${GAME.totalScore}</p>`,
    () => loadStage(GAME.stage + 1)
  );
}

function loseStage() {
  if (GAME.state !== 'playing') return;
  GAME.state = 'lose';
  showMessage(
    `<h2>ลองอีกครั้ง</h2>
     <p>กุ๊งกิ๊งยังไม่ยอมแพ้!</p>`,
    () => { GAME.lives = 3; loadStage(GAME.stage); }
  );
}

function showEnding() {
  const panel = document.getElementById('messagePanel');
  panel.innerHTML = `
    <h1>🎂 สุขสันต์วันเกิด กุ๊งกิ๊ง 🎂</h1>
    <h2>ครบรอบ 28 ปี</h2>
    <p>ขอให้ปีที่ 28 เต็มไปด้วยความสุข<br>สุขภาพแข็งแรง ร่ำรวย<br>และได้ทำในสิ่งที่รักทุกๆวัน</p>
    <p>ขอบคุณที่เป็นพยาบาลใจดี<br>ที่ดูแลคนไข้ด้วยหัวใจ ❤</p>
    <p style="margin-top:14px; font-size:13px;">คะแนนรวมทั้งเกม: ${GAME.totalScore}</p>
  `;
  const btn = document.createElement('button');
  btn.textContent = 'เริ่มใหม่';
  btn.onclick = () => { hide('messageScreen'); GAME.totalScore = 0; GAME.lives = 3; show('titleScreen'); };
  panel.appendChild(btn);
  show('messageScreen');

  // confetti animation overlay
  startConfetti();
}

/* ----------------- CONFETTI ----------------- */
let confetti = [];
function startConfetti() {
  confetti = [];
  for (let i = 0; i < 60; i++) {
    confetti.push({
      x: Math.random() * W,
      y: -Math.random() * H,
      vy: 1 + Math.random() * 2,
      vx: (Math.random() - 0.5) * 1.5,
      c: ['#FF4D6D','#FFD700','#3FA6FF','#7B2D8E','#5DC065','#fff'][Math.floor(Math.random()*6)],
    });
  }
}
function drawConfettiFrame() {
  for (const c of confetti) {
    c.x += c.vx; c.y += c.vy;
    if (c.y > H) c.y = -10;
    px(c.x, c.y, 3, 3, c.c);
  }
}

// extend draw loop to add confetti at ending screen
const origLoop = loop;

/* ----------------- INITIAL SCREEN BACKDROP ----------------- */
function drawTitleBackdrop() {
  drawSkyBackground(440);
  for (let i = 0; i < 6; i++) drawTree(i * 160, 440);
  for (let i = 0; i < 8; i++) drawBush(40 + i * 120, 440);
  drawGround(440);
  drawKungKing(W/2 - 32, 440 - 80, 'idle', 1, 4);
  const t = Date.now() / 200;
  for (let i = 0; i < 5; i++) {
    drawCoin(120 + i * 160, 200 + Math.sin(t + i) * 16, Math.floor(Date.now()/50));
  }
}

// continuously redraw title backdrop when on title screen
setInterval(() => {
  if (GAME.state === 'title') {
    drawTitleBackdrop();
  }
  if (GAME.state === 'win' && GAME.level && GAME.level.isFinal === false) {
    // pause frame
  }
  if (document.getElementById('messageScreen').contains(document.getElementById('messagePanel')) &&
      !document.getElementById('messageScreen').classList.contains('hidden')) {
    // draw confetti behind if final
    if (GAME.level && GAME.level.isFinal) {
      drawConfettiFrame();
    }
  }
}, 33);

</script>
